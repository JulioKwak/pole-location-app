<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전주 위치 조회</title>

  <link rel="stylesheet" href="./style.css" />

  <!-- 네이버 지도 -->
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=ql4o2776tv"></script>
</head>
<body>
  <div class="container">
    <h2>전주 위치 조회</h2>

    <div class="save-box" id="originBox">
      <h3>조회 조건</h3>

      <div class="save-grid">
        <div class="full">
          <label for="originSelect">원점 선택</label>
          <select id="originSelect">
            <option value="auto" selected>자동</option>
            <option value="1">원점1 (경기 오산)</option>
            <option value="2">원점2 (강원 태백)</option>
            <option value="3">원점3 (전남 담양)</option>
            <option value="4">원점4 (경남 양산)</option>
          </select>
        </div>

        <div class="full">
          <label for="dept1Select">관할부서 1차</label>
          <select id="dept1Select">
            <option value="">불러오는 중...</option>
          </select>
        </div>

        <input id="poleInput" class="full" placeholder="전주번호 입력 (예: 8927Y621)" />
      </div>

      <div class="helper" id="originStatus">
        조회 시 원점 기본값은 자동이며, 현재 위치 기준으로 가장 가까운 원점을 선택합니다.
      </div>

      <div class="button-row" style="margin-top:10px;">
        <button id="searchBtn" onclick="searchPole()">조회</button>
      </div>
    </div>

    <div class="info" id="loadingBox" style="display:none;">
      <div class="loading-inline">
        <span>조회 중</span>
        <span class="dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>

    <div class="info" id="infoBox">
      관할부서 1차와 전주번호를 입력한 뒤 조회하세요.
    </div>

    <div class="save-box">
      <h3>좌표 등록</h3>

      <div class="save-grid">
        <input id="saveLat" placeholder="위도" />
        <input id="saveLng" placeholder="경도" />

        <input id="saveAccuracy" placeholder="정확도(m), 예: 10" />
        <input id="saveObserver" placeholder="등록자명(선택)" />

        <textarea id="saveMemo" class="full" placeholder="메모(선택)" rows="3"></textarea>
      </div>

      <div class="button-row">
        <button onclick="fillCurrentLocation()">현재 GPS 불러오기</button>
        <button onclick="saveCoordinate()">좌표 저장</button>
      </div>

      <div class="notice">
        조회한 전주번호 기준으로 현재 입력된 좌표를 저장합니다.
      </div>
      <div class="helper">
        지도 클릭 시 위도/경도가 자동 입력됩니다.
      </div>
      <div class="helper">
        GPS 정확도는 30m 이하 권장, 100m 이상이면 재측정 권장, 300m 이상이면 지도 클릭 또는 수기 보정을 권장합니다.
      </div>

      <div class="gps-status" id="gpsStatus"></div>
      <div class="accuracy-warning" id="accuracyWarning"></div>
    </div>

    <div class="map-wrapper">
      <div id="map"></div>

      <div class="legend">
        <div class="legend-item">
          <span class="legend-dot real"></span>
          실좌표 (현장 등록 / 검증 좌표)
        </div>
        <div class="legend-item">
          <span class="legend-dot estimated"></span>
          추정 좌표 (참고용)
        </div>
        <div class="legend-item">
          <span class="legend-dot gps"></span>
          현재 GPS 위치
        </div>
        <div class="legend-item">
          <span class="legend-dot input"></span>
          지도 클릭 입력 좌표
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://pole-location-api.junho-9ba.workers.dev";

    let map;
    let marker;
    let clickMarker;
    let gpsMarker;
    let gpsAccuracyCircle;

    let currentPoleNo = null;
    let currentHeading = null;

    let currentGpsLat = null;
    let currentGpsLng = null;
    let currentGpsAccuracy = null;

    let lastSearchGps = null;
    let lastSelectedOrigin = null;

    let gpsRequestInProgress = false;
    let headingEnabled = false;

    const ORIGIN_LABELS = {
      auto: "자동",
      "1": "원점1 (경기 오산)",
      "2": "원점2 (강원 태백)",
      "3": "원점3 (전남 담양)",
      "4": "원점4 (경남 양산)"
    };

    function initMap() {
      const center = new naver.maps.LatLng(37.4563, 126.7052);

      map = new naver.maps.Map("map", {
        center,
        zoom: 12
      });

      naver.maps.Event.addListener(map, "click", function (e) {
        const lat = e.coord.lat();
        const lng = e.coord.lng();

        document.getElementById("saveLat").value = lat.toFixed(7);
        document.getElementById("saveLng").value = lng.toFixed(7);

        setClickMarker(lat, lng);

        document.getElementById("gpsStatus").textContent =
          "지도 클릭 좌표를 입력칸에 반영했습니다.";
      });
    }

    async function loadDept1s() {
      const dept1Select = document.getElementById("dept1Select");

      try {
        dept1Select.innerHTML = `<option value="">불러오는 중...</option>`;

        const res = await fetch(`${API_BASE}/api/dept1s`);
        const json = await res.json();

        if (!json.ok) {
          throw new Error(json.error || "관할부서 목록 조회 실패");
        }

        const list = Array.isArray(json.data) ? json.data : [];

        dept1Select.innerHTML = `<option value="">관할부서 1차 선택</option>`;

        list.forEach((dept1) => {
          const option = document.createElement("option");
          option.value = dept1;
          option.textContent = dept1;
          dept1Select.appendChild(option);
        });
      } catch (err) {
        dept1Select.innerHTML = `<option value="">불러오기 실패</option>`;
        document.getElementById("infoBox").textContent =
          "관할부서 1차 목록을 불러오지 못했습니다: " + err.message;
      }
    }

    function hexToRgba(hex, alpha) {
      const value = hex.replace("#", "");
      const bigint = parseInt(value, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function createPinIcon(color, options = {}) {
      const {
        heading = null,
        size = 30,
        dotSize = 18,
        borderSize = 4,
        haloSize = 8,
        withArrow = false,
        anchorX = 15,
        anchorY = 15
      } = options;

      const arrow = (withArrow && typeof heading === "number" && !Number.isNaN(heading))
        ? `
          <div style="
            position:absolute;
            left:50%;
            top:2px;
            width:0;
            height:0;
            transform:translateX(-50%) rotate(${heading}deg);
            transform-origin:50% 13px;
            pointer-events:none;
          ">
            <div style="
              position:absolute;
              left:-8px;
              top:-12px;
              width:0;
              height:0;
              border-left:8px solid transparent;
              border-right:8px solid transparent;
              border-bottom:14px solid white;
            "></div>
            <div style="
              position:absolute;
              left:-6px;
              top:-9px;
              width:0;
              height:0;
              border-left:6px solid transparent;
              border-right:6px solid transparent;
              border-bottom:11px solid ${color};
            "></div>
          </div>
        `
        : "";

      return {
        content: `
          <div style="
            position:relative;
            width:${size}px;
            height:${size}px;
          ">
            ${arrow}
            <div style="
              position:absolute;
              left:50%;
              top:50%;
              transform:translate(-50%, -50%);
              width:${dotSize}px;
              height:${dotSize}px;
              background:${color};
              border-radius:50%;
              border:${borderSize}px solid white;
              box-shadow:
                0 0 0 ${haloSize}px ${hexToRgba(color, 0.10)},
                0 1px 4px rgba(0,0,0,0.35);
            "></div>
          </div>
        `,
        anchor: new naver.maps.Point(anchorX, anchorY)
      };
    }

    function clearClickMarker() {
      if (clickMarker) {
        clickMarker.setMap(null);
        clickMarker = null;
      }
    }

    function clearGpsVisuals() {
      if (gpsMarker) {
        gpsMarker.setMap(null);
        gpsMarker = null;
      }

      if (gpsAccuracyCircle) {
        gpsAccuracyCircle.setMap(null);
        gpsAccuracyCircle = null;
      }
    }

    function setMarker(lat, lng, title, isEstimated) {
      const pos = new naver.maps.LatLng(lat, lng);

      if (marker) {
        marker.setMap(null);
      }

      const color = isEstimated ? "#ef6c00" : "#1565c0";

      marker = new naver.maps.Marker({
        position: pos,
        map: map,
        title: title,
        icon: createPinIcon(color, {
          withArrow: false,
          size: 30,
          dotSize: 18,
          borderSize: 4,
          haloSize: 8,
          anchorX: 15,
          anchorY: 15
        })
      });

      map.setCenter(pos);
      map.setZoom(17);
    }

    function setClickMarker(lat, lng) {
      const pos = new naver.maps.LatLng(lat, lng);

      if (clickMarker) {
        clickMarker.setMap(null);
      }

      clickMarker = new naver.maps.Marker({
        position: pos,
        map: map,
        title: "지도 클릭 입력 좌표",
        icon: createPinIcon("#2e7d32", {
          withArrow: false,
          size: 28,
          dotSize: 16,
          borderSize: 4,
          haloSize: 7,
          anchorX: 14,
          anchorY: 14
        })
      });
    }

    function setGpsMarker(lat, lng, heading = null) {
      const pos = new naver.maps.LatLng(lat, lng);

      if (gpsMarker) {
        gpsMarker.setMap(null);
      }

      gpsMarker = new naver.maps.Marker({
        position: pos,
        map: map,
        title: "현재 GPS 위치",
        icon: createPinIcon("#e53935", {
          heading,
          withArrow: true,
          size: 30,
          dotSize: 18,
          borderSize: 4,
          haloSize: 8,
          anchorX: 15,
          anchorY: 15
        })
      });
    }

    function setGpsAccuracyCircle(lat, lng, accuracy) {
      const pos = new naver.maps.LatLng(lat, lng);

      if (gpsAccuracyCircle) {
        gpsAccuracyCircle.setMap(null);
      }

      gpsAccuracyCircle = new naver.maps.Circle({
        map: map,
        center: pos,
        radius: Math.max(5, Number(accuracy || 0)),
        fillColor: "#e53935",
        fillOpacity: 0.08,
        strokeColor: "#e53935",
        strokeOpacity: 0.28,
        strokeWeight: 1
      });
    }

    function buildOriginText(origin) {
      if (!origin) return "-";

      if (typeof origin === "string") {
        return ORIGIN_LABELS[String(origin)] || "-";
      }

      const codeText = origin.code ? `원점${origin.code}` : "원점";
      const nameText = origin.name ? ` (${origin.name})` : "";
      return `${codeText}${nameText}`;
    }

    function renderInfo(data) {
      const box = document.getElementById("infoBox");
      const selectedOrigin = data?.estimation_detail?.origin || null;

      const sourceBadge = data.coordinate
        ? (
          data.is_estimated
            ? `<span class="badge badge-est">추정 좌표</span>`
            : `<span class="badge badge-exact">실좌표</span>`
        )
        : "";

      let coordHtml = `<div class="row">좌표 없음</div>`;

      if (data.coordinate) {
        coordHtml = `
          <div class="row"><span class="label">위도</span>${data.coordinate.latitude}</div>
          <div class="row"><span class="label">경도</span>${data.coordinate.longitude}</div>
          <div class="row"><span class="label">좌표출처</span>${data.coordinate_source || "-"}</div>
          <div class="row"><span class="label">선택원점</span>${buildOriginText(selectedOrigin)}</div>
          ${
            data.is_estimated
              ? `
                <div class="row"><span class="label">추정신뢰도</span>${data.coordinate.confidence_score ?? "-"}</div>
                <div class="row"><span class="label">후보 개수</span>${data.coordinate.candidate_count ?? "-"}</div>
                <div class="row"><span class="label">보정적용</span>${data.estimation_detail?.correction_applied ? "예" : "아니오"}</div>
              `
              : ""
          }
        `;
      } else {
        coordHtml = `
          <div class="row"><span class="label">좌표</span>없음</div>
          <div class="row"><span class="label">선택원점</span>${buildOriginText(selectedOrigin)}</div>
        `;
      }

      box.innerHTML = `
        <div class="row"><span class="label">전주번호</span>${data.pole_no} ${sourceBadge}</div>
        <div class="row"><span class="label">관할1</span>${data.dept1 || "-"}</div>
        <div class="row"><span class="label">관할2</span>${data.dept2 || "-"}</div>
        <div class="row"><span class="label">권역</span>${data.region_code || "-"}</div>
        <div class="row"><span class="label">번호유형</span>${data.pole_type || "-"}</div>
        <div class="row"><span class="label">파싱상태</span>${data.parse_status || "-"}</div>
        ${coordHtml}
      `;
    }

    function renderNoCoordinateGuide(data) {
      const box = document.getElementById("infoBox");
      const selectedOrigin = data?.estimation_detail?.origin || null;

      box.innerHTML = `
        <div class="row"><span class="label">전주번호</span>${data.pole_no}</div>
        <div class="row"><span class="label">관할1</span>${data.dept1 || "-"}</div>
        <div class="row"><span class="label">관할2</span>${data.dept2 || "-"}</div>
        <div class="row"><span class="label">권역</span>${data.region_code || "-"}</div>
        <div class="row"><span class="label">번호유형</span>${data.pole_type || "-"}</div>
        <div class="row"><span class="label">파싱상태</span>${data.parse_status || "-"}</div>
        <div class="row"><span class="label">선택원점</span>${buildOriginText(selectedOrigin)}</div>

        <div class="guide-title">추정 기준 좌표 부족!</div>
        <div class="guide-text">
          인근 전주의 전주번호와 좌표를 등록하면 추정이 가능해집니다.
        </div>
      `;
    }

    function showLoading() {
      document.getElementById("loadingBox").style.display = "block";
      document.getElementById("infoBox").style.display = "none";

      const btn = document.getElementById("searchBtn");
      btn.disabled = true;
      btn.textContent = "조회 중...";
    }

    function hideLoading() {
      document.getElementById("loadingBox").style.display = "none";
      document.getElementById("infoBox").style.display = "block";

      const btn = document.getElementById("searchBtn");
      btn.disabled = false;
      btn.textContent = "조회";
    }

    function updateAccuracyWarning(acc) {
      const warningEl = document.getElementById("accuracyWarning");

      if (acc === null || acc === undefined || Number.isNaN(acc)) {
        warningEl.textContent = "";
        warningEl.className = "accuracy-warning";
        return;
      }

      if (acc > 300) {
        warningEl.textContent = "정확도 경고: 현재 오차가 매우 큽니다(300m 초과). 지도 클릭 또는 수기 보정을 권장합니다.";
        warningEl.className = "accuracy-warning warn-high";
      } else if (acc > 100) {
        warningEl.textContent = "정확도 주의: 현재 오차가 큽니다(100m 초과). 가능하면 실외에서 재측정하세요.";
        warningEl.className = "accuracy-warning warn-mid";
      } else {
        warningEl.textContent = "정확도 상태: 저장 가능한 수준입니다.";
        warningEl.className = "accuracy-warning warn-ok";
      }
    }

    function resetSaveForm() {
      document.getElementById("saveLat").value = "";
      document.getElementById("saveLng").value = "";
      document.getElementById("saveAccuracy").value = "";
      document.getElementById("saveObserver").value = "";
      document.getElementById("saveMemo").value = "";

      document.getElementById("gpsStatus").textContent = "";
      document.getElementById("accuracyWarning").textContent = "";
      document.getElementById("accuracyWarning").className = "accuracy-warning";

      currentGpsLat = null;
      currentGpsLng = null;
      currentGpsAccuracy = null;
      currentHeading = null;

      clearClickMarker();
      clearGpsVisuals();
    }

    function getCurrentPositionForSearch() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve(null);
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            resolve({
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              accuracy: pos.coords.accuracy || null
            });
          },
          () => {
            resolve(null);
          },
          {
            enableHighAccuracy: true,
            timeout: 5000,
            maximumAge: 0
          }
        );
      });
    }

    async function searchPole() {
      const dept1 = document.getElementById("dept1Select").value.trim();
      const pole = document.getElementById("poleInput").value.trim().toUpperCase();
      const origin = document.getElementById("originSelect").value;

      if (!dept1) {
        alert("관할부서 1차를 선택하세요.");
        return;
      }

      if (!pole) {
        alert("전주번호를 입력하세요.");
        return;
      }

      showLoading();

      try {
        let apiUrl = `${API_BASE}/api/pole?dept1=${encodeURIComponent(dept1)}&no=${encodeURIComponent(pole)}`;

        if (origin === "auto") {
          const liveGps = await getCurrentPositionForSearch();
          lastSearchGps = liveGps;

          if (liveGps && liveGps.lat != null && liveGps.lng != null) {
            apiUrl += `&lat=${encodeURIComponent(liveGps.lat)}&lng=${encodeURIComponent(liveGps.lng)}`;

            const accText = liveGps.accuracy
              ? `정확도 약 ${Math.round(liveGps.accuracy)}m`
              : "정확도 확인 불가";

            document.getElementById("originStatus").textContent =
              `조회 기준 현재 위치 사용 · ${accText}`;
          } else {
            hideLoading();
            document.getElementById("originStatus").textContent =
              "원점을 찾지 못했습니다. 원점을 선택해주세요.";
            alert("현재 위치를 가져오지 못했습니다. 원점을 선택한 뒤 다시 조회하세요.");
            return;
          }
        } else {
          apiUrl += `&origin=${encodeURIComponent(origin)}`;
          document.getElementById("originStatus").textContent =
            `${ORIGIN_LABELS[origin]} 기준으로 조회합니다.`;
        }

        const res = await fetch(apiUrl);
        const json = await res.json();

        hideLoading();

        if (!json.ok) {
          alert(json.error || "조회 실패");
          return;
        }

        const data = json.data;
        currentPoleNo = data.pole_no;
        lastSelectedOrigin = data?.estimation_detail?.origin || null;

        if (data?.estimation_detail?.origin) {
          document.getElementById("originStatus").textContent =
            `조회 적용 원점: ${buildOriginText(data.estimation_detail.origin)}`;
        } else if (origin !== "auto") {
          document.getElementById("originStatus").textContent =
            `${ORIGIN_LABELS[origin]} 기준으로 조회했습니다.`;
        }

        if (data.coordinate) {
          renderInfo(data);

          setMarker(
            Number(data.coordinate.latitude),
            Number(data.coordinate.longitude),
            data.pole_no,
            data.is_estimated
          );
        } else {
          renderNoCoordinateGuide(data);
        }
      } catch (err) {
        hideLoading();
        alert("조회 중 오류가 발생했습니다: " + err.message);
      }
    }

    async function fillCurrentLocation() {
      if (!navigator.geolocation) {
        alert("이 브라우저는 위치 기능을 지원하지 않습니다.");
        return;
      }

      if (gpsRequestInProgress) {
        return;
      }

      gpsRequestInProgress = true;
      document.getElementById("gpsStatus").textContent = "현재 위치를 가져오는 중입니다...";
      updateAccuracyWarning(null);

      clearGpsVisuals();

      if (!headingEnabled) {
        await enableDeviceHeading();
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          gpsRequestInProgress = false;

          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          const acc = pos.coords.accuracy || null;

          currentGpsLat = lat;
          currentGpsLng = lng;
          currentGpsAccuracy = acc;

          clearClickMarker();

          document.getElementById("saveLat").value = lat.toFixed(7);
          document.getElementById("saveLng").value = lng.toFixed(7);
          document.getElementById("saveAccuracy").value = acc ? Math.round(acc) : "";

          setGpsMarker(lat, lng, currentHeading);
          setGpsAccuracyCircle(lat, lng, acc);

          map.setCenter(new naver.maps.LatLng(lat, lng));
          map.setZoom(17);

          const accText = acc ? `정확도 약 ${Math.round(acc)}m` : "정확도 확인 불가";
          const headingText =
            (typeof currentHeading === "number" && !Number.isNaN(currentHeading))
              ? ` / 방향 ${Math.round(currentHeading)}°`
              : " / 방향값 없음";

          document.getElementById("gpsStatus").textContent =
            `현재 GPS 위치 갱신 완료 · ${accText}${headingText}`;

          updateAccuracyWarning(acc);
        },
        (err) => {
          gpsRequestInProgress = false;
          document.getElementById("gpsStatus").textContent =
            "현재 위치를 가져오지 못했습니다: " + err.message;
          updateAccuracyWarning(null);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    async function enableDeviceHeading() {
      const statusEl = document.getElementById("gpsStatus");

      if (typeof DeviceOrientationEvent === "undefined") {
        statusEl.textContent += " / 방향센서 API 미지원";
        return;
      }

      if (typeof DeviceOrientationEvent.requestPermission === "function") {
        try {
          const permission = await DeviceOrientationEvent.requestPermission();

          if (permission !== "granted") {
            statusEl.textContent += " / 방향 권한 거부";
            return;
          }
        } catch (err) {
          statusEl.textContent += " / 방향 권한 요청 실패";
          return;
        }
      }

      window.removeEventListener("deviceorientation", handleOrientation);
      window.removeEventListener("deviceorientationabsolute", handleOrientation);

      window.addEventListener("deviceorientation", handleOrientation, true);
      window.addEventListener("deviceorientationabsolute", handleOrientation, true);

      headingEnabled = true;
    }

    function handleOrientation(event) {
      const heading = event.webkitCompassHeading ?? event.alpha;

      if (typeof heading !== "number" || Number.isNaN(heading)) {
        return;
      }

      currentHeading = heading;

      if (currentGpsLat !== null && currentGpsLng !== null) {
        setGpsMarker(currentGpsLat, currentGpsLng, currentHeading);
      }

      const accText = currentGpsAccuracy ? `정확도 약 ${Math.round(currentGpsAccuracy)}m` : "정확도 확인 불가";

      document.getElementById("gpsStatus").textContent =
        `현재 GPS 위치 갱신 완료 · ${accText} / 방향 ${Math.round(currentHeading)}°`;
    }

    async function saveCoordinate() {
      if (!currentPoleNo) {
        alert("먼저 전주번호를 조회하세요.");
        return;
      }

      const latitude = parseFloat(document.getElementById("saveLat").value);
      const longitude = parseFloat(document.getElementById("saveLng").value);
      const accuracyValue = document.getElementById("saveAccuracy").value.trim();
      const accuracy_m = accuracyValue ? parseFloat(accuracyValue) : null;
      const observer_name = document.getElementById("saveObserver").value.trim();
      const memo = document.getElementById("saveMemo").value.trim();

      if (Number.isNaN(latitude) || Number.isNaN(longitude)) {
        alert("위도/경도를 입력하세요.");
        return;
      }

      if (!Number.isNaN(accuracy_m) && accuracy_m > 300) {
        const proceed = confirm("현재 GPS 정확도 오차가 매우 큽니다(300m 초과). 그래도 저장하시겠습니까?");
        if (!proceed) return;
      } else if (!Number.isNaN(accuracy_m) && accuracy_m > 100) {
        const proceed = confirm("현재 GPS 정확도 오차가 큽니다(100m 초과). 저장 전에 재측정을 권장합니다. 계속 저장하시겠습니까?");
        if (!proceed) return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/observe`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            pole_no: currentPoleNo,
            latitude,
            longitude,
            accuracy_m,
            observer_name,
            memo
          })
        });

        const json = await res.json();

        if (!json.ok) {
          alert(json.error || "저장 실패");
          return;
        }

        alert("좌표가 저장되었습니다.");
        await searchPole();
        resetSaveForm();
      } catch (err) {
        alert("저장 중 오류가 발생했습니다: " + err.message);
      }
    }

    document.getElementById("poleInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        searchPole();
      }
    });

    document.getElementById("originSelect").addEventListener("change", function () {
      const origin = this.value;
      const originStatus = document.getElementById("originStatus");

      if (origin === "auto") {
        originStatus.textContent =
          "조회 시 현재 위치를 기준으로 가장 가까운 원점을 자동 선택합니다.";
      } else {
        originStatus.textContent =
          `${ORIGIN_LABELS[origin]}을(를) 선택했습니다. 조회 시 해당 원점을 사용합니다.`;
      }
    });

    document.addEventListener("DOMContentLoaded", async function () {
      initMap();
      await loadDept1s();
    });
  </script>
</body>
</html>
