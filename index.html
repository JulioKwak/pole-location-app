<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>전주 위치 조회</title>

<!-- 네이버 지도 -->
<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=ql4o2776tv"></script>

<style>

body{
font-family:Arial;
margin:0;
padding:20px;
background:#f5f5f5;
}

.container{
max-width:900px;
margin:auto;
}

.search{
display:flex;
gap:10px;
margin-bottom:15px;
}

input{
flex:1;
padding:12px;
font-size:16px;
}

button{
padding:12px 20px;
font-size:16px;
cursor:pointer;
}

.info{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:15px;
border:1px solid #ddd;
}

.row{
margin-bottom:8px;
}

.label{
font-weight:bold;
width:120px;
display:inline-block;
}

#map{
width:100%;
height:500px;
border:1px solid #ddd;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>전주 위치 조회</h2>

<div class="search">
<input id="poleInput" placeholder="전주번호 입력 (예: 8927Y621)">
<button onclick="searchPole()">조회</button>
</div>

<div class="info" id="infoBox">
전주번호를 입력하세요.
</div>

<div id="map"></div>

</div>

<script>

const API_BASE="여기에_WORKER_API_URL"

let map
let marker

function initMap(){

const center=new naver.maps.LatLng(37.4563,126.7052)

map=new naver.maps.Map('map',{
center:center,
zoom:12
})

}

function setMarker(lat,lng,title){

const pos=new naver.maps.LatLng(lat,lng)

if(marker){
marker.setMap(null)
}

marker=new naver.maps.Marker({
position:pos,
map:map,
title:title
})

map.setCenter(pos)
map.setZoom(17)

}

function renderInfo(data){

const box=document.getElementById("infoBox")

let coord="좌표 없음"

if(data.coordinate){

coord=`
<div class="row"><span class="label">위도</span>${data.coordinate.latitude}</div>
<div class="row"><span class="label">경도</span>${data.coordinate.longitude}</div>
`

}

box.innerHTML=`

<div class="row"><span class="label">전주번호</span>${data.pole_no}</div>
<div class="row"><span class="label">관할1</span>${data.dept1}</div>
<div class="row"><span class="label">관할2</span>${data.dept2}</div>
<div class="row"><span class="label">권역</span>${data.region_code}</div>

${coord}

`

}

async function searchPole(){

const pole=document.getElementById("poleInput").value.trim().toUpperCase()

if(!pole){
alert("전주번호 입력")
return
}

const res=await fetch(`${API_BASE}/api/pole?no=${pole}`)
const json=await res.json()

if(!json.ok){
alert("조회 실패")
return
}

const data=json.data

renderInfo(data)

if(data.coordinate){

setMarker(
data.coordinate.latitude,
data.coordinate.longitude,
data.pole_no
)

}

}

initMap()

</script>

</body>
</html>
